<!-- start custom analytics snippet -->

{% if site.goatcounter_code and site.goatcounter_code != "" %}
<!-- GoatCounter (privacy-friendly, no cookies) — dashboard is private to the owner -->
<script data-goatcounter="https://{{ site.goatcounter_code }}.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
{% endif %}

{% if site.google_analytics_id and site.google_analytics_id != "" %}
<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', '{{ site.google_analytics_id }}');
</script>
{% endif %}

<!-- end custom analytics snippet -->
