<!-- Scroll-reveal (fade/slide-in on scroll); respects reduced-motion via CSS -->
<script>
(function () {
  function initReveal() {
    var els = document.querySelectorAll('.reveal');
    if (!els.length) return;
    if (!('IntersectionObserver' in window)) {
      for (var i = 0; i < els.length; i++) { els[i].classList.add('is-visible'); }
      return;
    }
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    for (var j = 0; j < els.length; j++) { io.observe(els[j]); }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initReveal);
  } else {
    initReveal();
  }
}());
</script>

<!-- Manual light/dark theme toggle -->
<button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle light or dark theme" title="Toggle light / dark">
  <i class="fas fa-moon" aria-hidden="true"></i>
</button>
<script>
(function () {
  var btn = document.getElementById('theme-toggle');
  if (!btn) return;
  var root = document.documentElement;
  function current() {
    var t = root.getAttribute('data-theme');
    if (t === 'dark' || t === 'light') return t;
    return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  }
  function paint() {
    btn.innerHTML = current() === 'dark'
      ? '<i class="fas fa-sun" aria-hidden="true"></i>'
      : '<i class="fas fa-moon" aria-hidden="true"></i>';
  }
  paint();
  btn.addEventListener('click', function () {
    var next = current() === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) {}
    paint();
  });
}());
</script>

<!-- Align the nav tab group with the content column (measures the sidebar) -->
<script>
(function () {
  function alignNav() {
    var vlinks = document.querySelector('.greedy-nav .visible-links');
    var home = vlinks && vlinks.querySelector('.masthead__menu-item--lg');
    if (!home) return;
    var content = document.querySelector('.archive') || document.querySelector('.page');
    if (!content || window.innerWidth < 1024) { home.style.removeProperty('--nav-home-w'); return; }
    var w = content.getBoundingClientRect().left - vlinks.getBoundingClientRect().left;
    if (w > 0) { home.style.setProperty('--nav-home-w', Math.round(w) + 'px'); }
    else { home.style.removeProperty('--nav-home-w'); }
  }
  var raf;
  function schedule() { if (raf) { cancelAnimationFrame(raf); } raf = requestAnimationFrame(alignNav); }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', alignNav); }
  else { alignNav(); }
  window.addEventListener('load', alignNav);
  window.addEventListener('resize', schedule);
}());
</script>
